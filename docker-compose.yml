services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: gerenciador_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gerenciador_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      bash -c "python manage.py migrate && 
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=gerenciador_db
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita sobrescrever o node_modules do container pelo volume local
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Ajuda com hot-reload em alguns ambientes

volumes:
  postgres_data:
